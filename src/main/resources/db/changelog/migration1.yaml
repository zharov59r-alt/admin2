databaseChangeLog:
  - changeSet:
      id: 1
      author: zharov
      changes:
        - sql:
              dbms: postgresql
              sql: CREATE SCHEMA IF NOT EXISTS admin;
        - createTable:
            schemaName: admin
            tableName: user
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_email
                  type: text
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: user_password
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: user_first_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: user_last_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: user_middle_name
                  type: text
              - column:
                  name: creation_date
                  type: timestamp
                  constraints:
                    nullable: false
        - sql:
            dbms: postgresql
            sql: |
              ALTER TABLE admin.user
              ADD COLUMN search_text_vector tsvector 
              GENERATED ALWAYS AS (
                  to_tsvector(
                      'english',
                      regexp_replace(
                          (user_email || ' ' || user_first_name || ' ' || user_last_name || ' ' || COALESCE(user_middle_name, ''::text)),
                          '[^[:alnum:]_[:space:]]+'::text,
                          ' '::text,
                          'g'::text
                      )
                  )
              ) STORED;
        - createSequence:
            schemaName: admin
            sequenceName: s_user_id